parameters:
  BuildConfiguration: Release

steps:
  - task: UseDotNet@2
    displayName: 'Install .NET Core SDK'
    inputs:
      useGlobalJson: true
      
  - task: NuGetAuthenticate@1
    displayName: Authenticate to Azure Artifacts
  
  - task: DotNetCoreCLI@2
    displayName: Restore Build
    inputs:
      command: 'restore'
      projects: 'VSConfigFinder'
      feedsToUse: 'config'
      nugetConfigPath: '$(Build.SourcesDirectory)\build\nuget.config'
      
  - task: DotNetCoreCLI@2
    displayName: Build
    inputs:
      command: 'build'
      projects: 'VSConfigFinder'
      arguments: '--configuration $(BuildConfiguration) --no-restore --configfile $(Build.SourcesDirectory)\build\nuget.config'

  - task: DotNetCoreCLI@2
    displayName: Restore Test
    inputs:
      command: 'restore'
      projects: 'VSConfigFinder.Test'
      feedsToUse: 'config'
      nugetConfigPath: '$(Build.SourcesDirectory)\build\nuget.config'

  - task: DotNetCoreCLI@2
    displayName: Test
    inputs:
      command: 'test'
      projects: 'VSConfigFinder.Test'
      arguments: '--configuration $(BuildConfiguration) --no-restore -p:RestoreConfigFile=$(Build.SourcesDirectory)\build\nuget.config'

  - task: DotNetCoreCLI@2
    displayName: Publish
    inputs:
      command: 'publish'
      arguments: '--no-build --configuration $(BuildConfiguration)'
      publishWebProjects: false
      zipAfterPublish: false

  - script: |
      choco pack pkg\VSConfigFinder\VSConfigFinder.nuspec --out "VSConfigFinder\bin\${{ parameters.BuildConfiguration }}" --version "$(GitBuildVersion)" "Configuration=${{ parameters.BuildConfiguration }}" "CommitId=$(Build.SourceVersion)" "Tag=$(Build.BuildNumber)"
    displayName: 'Package Nupkg'
    workingDirectory: $(Build.SourcesDirectory)

  - task: CopyFiles@2
    displayName: 'Copy build artifacts'
    inputs:
      SourceFolder: $(Build.SourcesDirectory)\VSConfigFinder
      Contents: |
        bin\$(BuildConfiguration)\**
      TargetFolder: $(Build.ArtifactStagingDirectory)\out

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish build artifacts'
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)\out
      artifactName: drop
